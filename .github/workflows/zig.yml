name: zig

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: mlugg/setup-zig@v2
        name: Set up zig
        with:
          version: 0.16.0

      - name: Build
        run: |
          zig build
      - name: Format check
        run: |
          zig fmt --check src/*
          zig fmt --check examples/* tests/* build.zig
      - name: Unit tests
        run: |
          zig build test
      - name: Build examples
        run: |
          zig build examples
      - name: Integration tests
        run: |
          zig build integration-test
